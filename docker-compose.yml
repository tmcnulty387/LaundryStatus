services:
  # For local dev only
  db:
    image: docker.io/library/postgres:16-alpine
    env_file: ./.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d laundry"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: ./.env
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
