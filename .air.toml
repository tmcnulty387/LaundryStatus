root = "."
tmp_dir = "tmp"

[build]
  cmd = "cd backend && go build -o ../tmp/main ./cmd"
  bin = "tmp/main"
  full_bin = "tmp/main"
  include_dir = ["backend"]
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  exclude_dir = ["tmp", "frontend", ".git", "node_modules"]
  exclude_regex = ["_test.go"]
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"

[log]
  time = true
