version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/repository/sqlc/query.sql"
    schema: "./internal/repository/migrations"
    gen:
      go:
        package: "repo"
        out: "./internal/repository/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true # generate Querier interface
